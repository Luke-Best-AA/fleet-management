{% if flashes %}
<div id="flash-messages">
    {% for flash in flashes %}
    <div class="alert alert-{{ flash.category }} alert-dismissible fade show" role="alert">
        {{ flash.message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
</div>
{% endif %}
