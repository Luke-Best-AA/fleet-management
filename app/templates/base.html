<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Fleet Management{% endblock %}</title>
    <link href="/static/vendor/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/vendor/css/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    {% include "partials/_nav.html" %}

    <main class="container py-4">
        {% include "partials/_messages.html" %}
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-light text-muted py-3 mt-auto border-top">
        <div class="container text-center">
            <small>&copy; 2026 Fleet Management System</small>
        </div>
    </footer>

    <script src="/static/vendor/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/table-sort.js"></script>
    <script src="/static/js/table-filter.js"></script>
    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
