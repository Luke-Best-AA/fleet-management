name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: Check linting
        run: ruff check .
      - name: Check formatting
        run: ruff format --check .
      - name: Save lint report
        if: always()
        run: |
          mkdir -p reports
          ruff check . --output-format json > reports/ruff.json || true
          ruff format --check . > reports/ruff-format.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-lint
          path: reports/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --upgrade pip && pip install bandit pip-audit -r requirements.txt
      - name: Bandit security scan
        run: bandit -r app/ seed.py run.py
      - name: Dependency vulnerability audit
        run: pip-audit
      - name: Save security reports
        if: always()
        run: |
          mkdir -p reports
          bandit -r app/ seed.py run.py -f json -o reports/bandit.json || true
          pip-audit --format json --output reports/pip-audit.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-security
          path: reports/

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fleet_management_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run tests
        run: |
          mkdir -p reports
          pytest tests/ --ignore=tests/e2e -v --tb=short --junitxml=reports/pytest.xml
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fleet_management_test
          REDIS_URL: redis://localhost:6379/0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-test
          path: reports/

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Install Playwright browsers
        run: playwright install --with-deps chromium
      - name: Run E2E tests
        run: |
          mkdir -p reports
          pytest tests/e2e/ -v --tb=short --junitxml=reports/e2e.xml -W ignore::DeprecationWarning
        env:
          DATABASE_URL: sqlite:///./test_e2e.db
          REDIS_URL: redis://localhost:6379/0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-e2e
          path: reports/

  zap:
    name: OWASP ZAP Scan
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Seed database and start app
        run: |
          mkdir -p reports
          python seed.py
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -f http://localhost:8000/auth/login || exit 1
        env:
          DATABASE_URL: sqlite:///./zap_test.db
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: zap-ci-secret-key
          SECURE_COOKIES: "false"
      - name: Run ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: http://localhost:8000
          cmd_options: "-I"
          allow_issue_writing: false
        env:
          ZAP_AUTH_HEADER_VALUE: ""
      - name: Upload ZAP HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html
      - name: Copy ZAP JSON for combined report
        if: always()
        run: |
          mkdir -p reports
          cp report_json.json reports/zap.json 2>/dev/null || true
      - name: Upload ZAP JSON for combined report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-zap
          path: reports/

  report:
    name: CI Report
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, security, test, e2e, zap]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          pattern: report-*
          path: reports/
          merge-multiple: true
      - name: Download ZAP HTML report
        uses: actions/download-artifact@v4
        with:
          name: zap-report
          path: .
        continue-on-error: true
      - name: Generate combined HTML report
        run: python scripts/generate_ci_report.py
      - uses: actions/upload-artifact@v4
        with:
          name: ci-report
          path: |
            reports/ci-report.html
            reports/ruff-detail.html
            reports/bandit-detail.html
            reports/pip-audit-detail.html
            reports/zap-detail.html
            reports/zap-report.html
